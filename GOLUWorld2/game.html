<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
    <style>

    *{ margin: 0; padding: 0; }

    body{
        background     : #4e0000;
        display        : flex;
        justify-content: center;
        align-items    : center;
        height         : 100VH;
        overflow       : hidden;
    }

    #render{
        border: 2px solid black;
        background: black;
        line-height: 0;
        padding: 0;

        cursor: none;
    }

    #debug{
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 16px;
        color: white;

        --outline-color: #000000;
        text-shadow:
            -1px -1px 0 var(--outline-color),
             1px -1px 0 var(--outline-color),
            -1px  1px 0 var(--outline-color),
             1px  1px 0 var(--outline-color),
             0px -1px 0 var(--outline-color),
             0px  1px 0 var(--outline-color),
            -1px  0px 0 var(--outline-color),
             1px  0px 0 var(--outline-color);
        padding: 10px;

        box-sizing: border-box;
        overflow: hidden;
        z-index: 10;

        opacity: 0.7;
    }

    @keyframes slideDown{
        from{ opacity: 0; transform: translateY(-20px); }
        to  { opacity: 1; transform: translateY(  0  ); }
    }

    </style>
</head>

<body>
    <div id="render"></div>
    <div id="debug"></div>

    <script src="bootstrap.js"></script>
    <script src="render.js"></script>
    <script src="debug.js"></script>

    <script src="resource/resource.js"></script>
    <script src="resource/textures.js"></script>

    <script src="game/game.js"></script>
    <script src="game/player.js"></script>

    <script src="init.js"></script>
</body>

</html>
