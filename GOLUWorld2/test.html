<!DOCTYPE html>
<html>
<body style="background: #111; color: white; font-family: sans-serif;">
<div id="fps">FPS: 0</div>
<div id="status">Выполняю 4.5 млн синусов на кадр...</div>
<canvas id="canvas" style="image-rendering: pixelated; border: 1px solid #555;"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const fpsLabel = document.getElementById('fps');

    const width = 500*2;
    const height = 200*2;

    canvas.width = width
    canvas.height = height

    const imageData = ctx.createImageData(width, height);
    const buf = new Uint32Array(imageData.data.buffer);

    let lastTime = performance.now();
    let frames = 0;

    function frame(time) {
        const t = time * 0.002; // Время для анимации

        // --- НАЧАЛО ВЫЧИСЛЕНИЙ ---
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const i = y * width + x;

                // Сложная формула (Плазма)
                // 4 вызова Math.sin + расчет расстояния + нормализация
                let val = Math.sin(x / 5.0 + t);
                val += Math.sin((y / 3.0 + t) * 0.5);
                val += Math.sin((x + y) / 10.0 + t);

                const dx = x - width / 2;
                const dy = y - height / 2;
                const dist = Math.sqrt(dx * dx + dy * dy) / 3.0;
                val += Math.sin(dist + t);

                // Превращаем значение (-4...4) в цвет 0-255
                const r = Math.floor((Math.sin(val) + 1) * 127);
                const g = Math.floor((Math.sin(val + 2.0) + 1) * 127);
                const b = Math.floor((Math.sin(val + 4.0) + 1) * 127);

                // Записываем пиксель 0xAABBGGRR
                buf[i] = (255 << 24) | (b << 16) | (g << 8) | r;
            }
        }
        // --- КОНЕЦ ВЫЧИСЛЕНИЙ ---

        ctx.putImageData(imageData, 0, 0);

        frames++;
        const now = performance.now();
        if (now - lastTime >= 1000) {
            fpsLabel.innerText = "FPS: " + frames;
            frames = 0;
            lastTime = now;
        }

        requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
</script>
</body>
</html>
