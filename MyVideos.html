<!DOCTYPE HTML>
<meta charset="utf-8">
<title>MyVideos</title>
<link rel="icon" type="image/x-icon" href="source/myVideo.ico">

<style>
*{
	font-family: "Roboto", "Arial", sans-serif;
	font-weight: 400;
	box-sizing: border-box;
	cursor: default;
}

html{
	background-image: url("source/background_.png");
	overflow-x: hidden;
	scrollbar-width: thin;
}

body{
	margin: 0;
}

.FullscreenGradient{
	width: 100vw;
	height: 100vh;
	min-width: 1200px;
	position: fixed;
	left: 50%;
	transform: translateX(-50%);
	background-image: url('source/gradient.png');
	background-size: contain;
	background-position: center;
	pointer-events: none;
	opacity: 0.3;
}

.Header, .Footer{
	width: 100vw;
	height: 25px;
	box-sizing: content-box;
	background-color: rgb(240, 240, 240);
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25), 0 0 20px rgba(0, 0, 0, 0.15);
	border-block: 2px solid rgba(255, 255, 255, 1);
	display: flex;
	justify-content: center;
	align-items: center;
	gap: 5px;
}

.Header input{
	width: 800px;
	padding: 2px 6px;
	border-radius: 4px;
	border: 1px solid rgba(0,0,0,0.2);
	outline: none;
	cursor: text;
}

.Footer{
	height: auto;
	padding-block: 15px;
}


.FooterPanel{
	background-color: rgb(170, 170, 170);
	border: 2px solid rgba(255, 255, 255, 1);
	border-radius: 8px;
	padding: 10px;
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
	color: black;
	display: flex;
	gap: 6px;
	align-items: center;
	flex-wrap: wrap;
	width: 90vw;
}

.PageWrapper{
	min-height: 100vh;
	display: flex;
	flex-direction: column;
}

.ContentWrapper{
	width: 100vw;
	display: flex;
	justify-content: center;
	
	flex-grow: 1;
}

#Content{
	width: 1200px;
	display: flex;
	flex-direction: column;
	gap: 3px;
	margin-block: 10px;
}

.VideoPanel{
	width: 100%;
	border: 2px solid white;
	border-radius: 8px;
	padding: 10px;
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
	color: black;
	display: flex;
	flex-direction: column;
	gap: 2px;
}

.WIP{
	/*border: 2px solid transparent;*/
	border-image: repeating-linear-gradient(
		-45deg,
		 gray 0px,
		 gray 2px,
		 orange 2px,
		 orange 4px
	);
	border-image-slice: 1;
}

.ContentURL, .ContentURL *{
	cursor: pointer;
}

.VideoPanel a:not(.URL):not(.ContentURL){
	display: inline-flex;
	align-items: center;
	justify-content: center;
	text-decoration: none;
	color: #fff;
	background-color: rgba(0, 123, 255, 1);
	border-radius: 6px;
	font-size: 14px;
	font-weight: 500;
	transition: all 0.2s ease;
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
	cursor: pointer;
	border: 1px solid rgba(255, 255, 255, 1);
}

.VideoPanel a:not(.URL):not(.ContentURL):hover{
	transform: scale(1.05);
	box-shadow: 0 4px 12px rgba(200, 200, 255, 1);
}

.VideoPanel a:not(.URL):not(.ContentURL):active{
	background-color: rgba(0, 90, 200, 1);
	transform: scale(0.98);
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
}

.SmallPanel{
	display: inline-flex;
	align-items: center;
	justify-content: center;
	padding: 2px 6px;
	background-color: rgba(0, 0, 0, 0.15);
	color: white;
	font-size: 12px;
	font-weight: 500;
	border-radius: 4px;
	border: 1px solid rgba(255, 255, 255, 0.3);
	white-space: nowrap;
}

#Tooltip{
	position: fixed;
	background-color: rgba(0,0,0,0.5);
	color: white;
	padding: 4px 8px;
	border-radius: 4px;
	font-size: 12px;
	pointer-events: none;
	white-space: pre-line;
	z-index: 9999;
	display: none;
	border: 1px solid rgba(255, 255, 255, 1);
	backdrop-filter: blur(6px);
}

[tooltip]:not(.ContentURL){
	cursor: help;
}

.URL{
	color: #1A8CFF;
	text-decoration: none;
	font-weight: 500;
	transition: all 0.2s ease;
	cursor: pointer;
	text-shadow: 0 1px 1px blue;
}

.URL:hover{
	color: #C1E0FF;
	text-decoration: underline;
}

.URL:active{
	color: #0066CC;
}

.Error{
	color: #FF4D4D;
	text-decoration: none;
	font-weight: 500;
	transition: all 0.2s ease;
}

.Error:hover{
	color: #E60000;
}

.Button{
	display: inline-block;
	padding: 8px 16px;
	background-color: rgba(0, 123, 255, 1);
	color: #fff;
	font-size: 14px;
	font-weight: 500;
	text-align: center;
	border: 1px solid rgba(255, 255, 255, 1);
	border-radius: 6px;
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
	cursor: pointer;
	transition: all 0.2s ease;
	user-select: none;
}

.Button:hover{
	transform: scale(1.05);
	box-shadow: 0 4px 12px rgba(200, 200, 255, 1);
}

.Button:active{
	background-color: rgba(0, 90, 200, 1);
	transform: scale(0.98);
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
}



.circle{
	width: 15px;
	height: 15px;
	border-radius: 50%;
	background: #ff0000;
	animation: breathe 2s ease-in-out infinite;
	box-shadow: 0 0 50px #ff0000;
}

@keyframes breathe{
	0%, 100% {
		transform: scale(1);
		background: #ff0000;
		box-shadow: 0 0 50px #ff0000;
	}
	50% {
		transform: scale(1.2);
		background: #ff3333;
		box-shadow: 0 0 80px #ff3333, 0 0 120px rgba(255, 0, 0, 0.5);
	}
}



</style>

<div class="PageWrapper">

	position: fixed;
	bottom: 20px;

	<div class="FooterPanel">
		<div class="SmallPanel" id="Info_TotalVideo"></div>
		<div class="SmallPanel" id="Info_TotalDuration"></div>
		<div class="SmallPanel" id="Info_Visible"></div>
		<div style="width: 100%;">
			<div class="SmallPanel" style="background-color: white; width: 100%; height: 240px; display: block; margin-bottom: 10px;"><canvas id="Info_Chart_Duration"></canvas></div>
			<div class="SmallPanel" style="background-color: white; width: 100%; height: 240px; display: block;"><canvas id="Info_Chart_Creation"></canvas></div>
		</div>
		<button class="Button" onclick="CheckForDuplicates();">Проверить на дубликаты</button>

	</div>
</div>

</div>

<script>

// Детект вувза

const __WoowzInfo = [
	"Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:152.0) Gecko/20100101 Firefox/152.0",
	"ru-RU",
	"Win32",
	16,
	"Europe/Moscow",
	24,
	24
]

const __UserInfo = [
	navigator.userAgent,
	navigator.language,
	navigator.platform,
	navigator.hardwareConcurrency,
	Intl.DateTimeFormat().resolvedOptions().timeZone,
	screen.colorDepth,
	screen.pixelDepth
]

console.log(__UserInfo)
console.log(__WoowzInfo)
console.log(JSON.stringify(__UserInfo) === JSON.stringify(__WoowzInfo))

const UserWoowz = JSON.stringify(__UserInfo) === JSON.stringify(__WoowzInfo)

if(!UserWoowz){
	document.getElementById("circle").remove()
}

// ----------------------------------------------------------------------


if(Ignore_Errors){ document.title += " (IGNORE)" }

const Content = document.getElementById("Content");

function ShowErrorNotification(Message, Color = "red"){
	const Div = document.getElementById("ErrorNotification");

	let Text;

	if(Message instanceof Error){
		console.error(Message);
		Text = Message.name + ": " + Message.message + (Message.stack ? "\n" + Message.stack : "");
	}else{
		Text = String(Message);
	}

	Div.textContent = Text;
	Div.style.display = "block";
	Div.style.backgroundColor = Color;

	clearTimeout(Div.timeout)
	Div.timeout = setTimeout(() => {
		Div.style.display = "none";
	}, 6000);
}

window.onerror = function(message, source, lineno, colno, error){
	ShowErrorNotification(error);
	return false;
}

window.onunhandledrejection = function(event){
	let Message = `Unhandled Promise Rejection: ${event.reason}`;
	console.error(Message);
	ShowErrorNotification(Message);
}

const CurrentURL = window.location.href.split("#")[0];

function RandomColor(Seed, Whiteness){
	let Hash = 2166136261;

	for(let i = 0; i < Seed.length; i++){
		Hash ^= Seed.charCodeAt(i);
		Hash += (Hash << 1) + (Hash << 4) + (Hash << 7) + (Hash << 8) + (Hash << 24);
	}

	let R = (Hash >> 16) & 0xFF;
	let G = (Hash >> 8)  & 0xFF;
	let B =  Hash        & 0xFF;

	if(Whiteness == null){ Whiteness = 0; }

	R = Math.round(R + (255 - R) * Whiteness);
	G = Math.round(G + (255 - G) * Whiteness);
	B = Math.round(B + (255 - B) * Whiteness);

	function ToHex(Byte){ return Byte.toString(16).padStart(2, "0"); }

	return "#" + ToHex(R) + ToHex(G) + ToHex(B);
}

function RainbowColor(T, Alpha){
	return `hsl(${T * 300}, 100%, 50%, ${Alpha})`;
}

function ParseDate(Input){
	if(!Input || Input === UNKNOWN_Date){ return null; }

	const Parts = Input.split(" ");
	const DatePart = Parts[0];

	let Y, M, D;

	if(DatePart.includes(".")){
		const nums = DatePart.split(".");
		
		if(nums[0].length === 4){
			// YYYY.MM.DD
			[Y, M, D] = nums.map(n => parseInt(n, 10));
		}else{
			// DD.MM.YYYY
			[D, M, Y] = nums.map(n => parseInt(n, 10));
		}
	}

	return new Date(Y, M - 1, D).getTime();
}

function UpdateContent(VideosList){
	const AddedIDs = new Set();

	Content.innerHTML = "";
	
	let TotalDuration    = 0;
	let TotalVisible     = 0;
	let TotalDurationAll = [];
	
	function DurationToSeconds(D){
		if(typeof D === "number" && !isNaN(D)){
			return D;
		}
		
		if(typeof D === "string"){
			const Parts = D.split(":").map(Number);

			if(Parts.some(isNaN)){
				return NaN;
			}

			if(Parts.length === 2){
				return Parts[0] * 60 + Parts[1];
			}else if(Parts.length === 3){
				return Parts[0] * 3600 + Parts[1] * 60 + Parts[2];
			}
		}
	}
	
	for(let i = 0; i < VideosList.length; i++){
		try{
			let Video = VideosList[i];

			let ID           = Video[0];
			let Name         = Video[1];
			let CreationDate = Video[2];
			let YoutubeID    = Video[3];
			let PublishDate  = Video[4];
			let Duration     = Video[5];
			let Visibility   = Video[6];
			let Tags         = Video[7];
			let Description  = Video[8];

			let LostMedia = PublishDate === LOSTMEDIA;

			if(!Ignore_Errors){
				try{
					if(ID           === DEFAULT_ID       ){ throw new Error("ID пуст!"          ); }
					if(CreationDate === DEFAULT_Creation ){ throw new Error("CreationDate пуст!"); }
					if(YoutubeID    === DEFAULT_YoutubeID){ throw new Error("YoutubeID пуст!"   ); }
					if(PublishDate  === DEFAULT_Publish  ){ throw new Error("PublishDate пуст !"); }
					if(Duration     === DEFAULT_Duration ){ throw new Error("Duration пуст!"    ); }
					
					if(AddedIDs.has(ID)){ throw new Error("Видео с таким ID уже есть!"); }
				}catch(e){
					throw new Error("Произошла ошибка при загрузке видео [" + Video + "]! " + e);
				}
			}
			
			let UnknownDuration = Duration  === UNKNOWN_Duration;
			let UnknownLink     = YoutubeID === UNKNOWN_Link;

			let OriginalDuration = Duration
			if(Duration === REALZERO_Duration){ Duration = "00:00" }

			AddedIDs.add(ID);
			let Seconds = DurationToSeconds(Duration);
			if(!isNaN(Seconds) && isFinite(Seconds)){
				TotalDuration += Seconds;
				TotalDurationAll.push(Seconds);
			}else{
				TotalDurationAll.push(0);
			}
			
			if(Visibility === P_Link || Visibility === P_Public){ TotalVisible += 1; }

			let WatchURL = "https://youtu.be/" + YoutubeID;
			let EditURL  = "https://studio.youtube.com/video/" + YoutubeID + "/edit";

			const Height = "28px";

			let Archive = false
			let WIP = false

			let TagsHTML = "";
			for(let j = 0; j < Tags.length; j++){
				let TagID          = Tags[j];
				let Tag            = TAGS[TagID];
				let TagName        = Tag[0];
				let TagIcon        = Tag[1];
				let TagDescription = Tag[2];

				if(TagID === T_Archive){ Archive = true }
				if(TagID === T_WIP    ){ WIP     = true }

				TagsHTML += `<a
					class="ContentURL"
					href="${CurrentURL}#tag%3A${TagID}"
					tooltip="<b>[${TagID}] ${TagName}</b><br>${TagDescription}"
				><img 
					style="
						width:${Height};
						height:${Height};
						border-radius: 5px;
						aspect-ratio: 1 / 1;
					"
					src="${Tag[1]}"
					alt="${Tag[0]}"
				></a>`;
			}

			let Hide = !UserWoowz && Archive

			const VisibilityText = (Visibility === P_Hide ? "🔒 Скрыто" : (Visibility === P_Link ? "🔗 Ссылка" : (Visibility === P_Blocked ? "🚫 Заблокировано" : "🌐 Публичное")));

			function FormatDateTime(Input){
				if(Input === UNKNOWN_Date){ return "??.??.????"; }
			
				const Parts    = Input.split(" ");
				const DatePart = Parts[0];
				const TimePart = Parts[1];

				const [Y, M, D] = DatePart.split(".");

				function Pad2(N){ return String(N).padStart(2, "0"); }

				if(TimePart){
					let [H, m, S] = TimePart.split(":");
					H = parseInt(H, 10);
					m = parseInt(m, 10);
					return `${Pad2(H)}:${Pad2(m)} | ${Pad2(D)}.${Pad2(M)}.${Y}`;
				}else{
					return `${Pad2(D)}.${Pad2(M)}.${Y}`;
				}
			}

			let CreationDateText = FormatDateTime(CreationDate);
			let PublishDateText  = LostMedia ? "Потеряно" : FormatDateTime(PublishDate);
			
			let DurationText    = UnknownDuration ? "??:??" : Duration;
			let DurationTooltip = UnknownDuration ? "Неизвестная длительность видео" : `Длительность видео: ${Seconds} секунд (${(Seconds / 60).toFixed(2)} минут) (${(Seconds / 60 / 60).toFixed(2)} часов) (${(Seconds / 60 / 60 / 24).toFixed(2)} дней)`;
			
			function FormatDescription(Input){
				function FormatURL(Input){
					const Pattern = /(https?:\/\/[^\s]+)/g;
					return Input.replace(Pattern, (URL) => {
						let EndChar = "";
						if(/[)\]\},.?]/.test(URL.slice(-1))){
							EndChar = URL.slice(-1);
							URL = URL.slice(0, -1);
						}
						return `<a class="URL" href="${URL}"">${URL}</a>${EndChar}`;
					})
				}
				
				function FormatTimeCode(Input){
					const TimeCodePattern = /\b(\d{1,2}:\d{2}(?::\d{2})?)\b/g;
					const QuestionPattern = /\[\?\]/g;

					let Result = Input.replace(QuestionPattern, () => {
						return `<span class="Error" tooltip="Не указано видео! Возможно в будущем будет указано">[?]</span>`;
					});

					Result = Result.replace(TimeCodePattern, (TimeCode) => {
						return `<a class="URL" href="${WatchURL}&t=${DurationToSeconds(TimeCode)}">${TimeCode}</a>`;
					});

					return Result;
				}
				
				function FormatIDLink(Input){
					return Input.replace(/\[(\d+)\]/g, (M, ID) => {
						const Video = VIDEOS.find(V => V[0] === parseInt(ID, 10));
						if(Video){
							return `<a class="URL" href="${CurrentURL}#id%3A${ID}">${M}</a>`;
						}
						return M;
					})
				}
				
				return FormatIDLink(FormatTimeCode(FormatURL(Input)));
			}

			const NameText        = Hide ? "<i tooltip='У вас нет доступа к названию'>???</i>" : FormatDescription(Name);
			const DescriptionText = Hide ? "<i tooltip='У вас нет доступа к описанию'>???</i>" : FormatDescription(Description);

			const YoutubeButtons = `<a tooltip="Посмотреть видео на YouTube" href="${WatchURL}" style="height:${Height};">${YoutubeID == DEFAULT_YoutubeID ? "❔" : "👁️"}</a>
				<a tooltip="Редактировать видео в YouTube Studio" href="${EditURL}" style="height:${Height};">${YoutubeID === DEFAULT_YoutubeID ? "❔" : "✏️"}</a>`;

			const VideoContent = `<div style="display: flex; gap: 5px;">
				<a class="ContentURL" tooltip="Установить в поиск только это видео" href="${CurrentURL}#id%3A${ID}"><div class="SmallPanel" style="height:${Height};">${ID}</div></a>
				<div style="flex-grow: 1;">${NameText}</div>
				<div style="display: flex; flex; gap: 2px;">${TagsHTML}</div>
				<div class="SmallPanel" tooltip="${DurationTooltip}" style="height:${Height}; background-color:${OriginalDuration === DEFAULT_Duration || UnknownDuration ? 'black' : RainbowColor((Seconds / (10 * 3600)), 0.7)};">${DurationText}</div>
				<div class="SmallPanel" tooltip="Дата создания: ${CreationDate === UNKNOWN_Date ? '????.??.??' : CreationDate}" style="height:${Height};">${CreationDateText}</div>
				<div class="SmallPanel" tooltip="${LostMedia ? 'Видео было потеряно, или удалено, или известно о его существовании, но оно не найдено' : 'Дата публикации: ' + PublishDate}" style="height:${Height};">${PublishDateText}</div>
				<a class="ContentURL" tooltip="Установить в поиск только видео подобного типа" href="${CurrentURL}#visible%3A${Visibility}"><div class="SmallPanel" style="height:${Height};">${VisibilityText}</div></a>
				${UnknownLink ? '' : YoutubeButtons}
			</div>
	<div style="color: rgba(0, 0, 0, 0.5);">${DescriptionText}</div>`;
			
			const Panel = document.createElement("div");
			Panel.className = "VideoPanel" + (WIP ? " WIP" :  "");
			Panel.innerHTML = VideoContent;
			Panel.style.background = PublishDate === DEFAULT_Publish
    ? "linear-gradient(90deg, rgb(30, 30, 30), rgb(60, 20, 20), rgb(30, 30, 30))"
    : `linear-gradient(90deg, ${RandomColor(PublishDateText, 0.5)}, ${RandomColor(PublishDateText + "_2", 0.5)}, ${RandomColor(PublishDateText + "_3", 0.5)})`;

			Content.appendChild(Panel);
		}catch(e){
			ShowErrorNotification(e);
		}
	}
	
	function UpdateInfo(){
		document.getElementById("Info_TotalVideo").innerHTML = "Видео: "     + VideosList.length;
		document.getElementById("Info_Visible"   ).innerHTML = "Публичных: " + TotalVisible + " (" + Math.floor(TotalVisible / VideosList.length * 100) + "%)";
		
		function SecondsToDuration(S){
			if(isNaN(S) || !isFinite(S) || S < 0){
				return "??:??:??"
			}
		
			const D   = Math.floor( S / 86400        );
			const H   = Math.floor((S % 86400) / 3600);
			const M   = Math.floor((S % 3600 ) / 60  );
			const Sec = S % 60

			const Pad2 = N => String(N).padStart(2, "0");

			let Result = "";

			if(         D > 0){ Result += D + ":"; }
			if(H > 0 || D > 0){ Result += Pad2(H) + ":"; }

			Result += Pad2(M) + ":" + Pad2(Sec);

			return Result;
		}
		
		function MedianDuration(){
			if(TotalDurationAll.length === 0){ return 0; }
			
			const Sorted = TotalDurationAll.slice().sort((A, B) => A - B);
			const Median = Math.floor(Sorted.length / 2);
			
			if(Sorted.length % 2 === 1){
				return Sorted[Median];
			}else{
				return (Sorted[Median - 1] + Sorted[Median]) / 2;
			}
		}
		
		document.getElementById("Info_TotalDuration").innerHTML = "Время: " + SecondsToDuration(TotalDuration) + " (В среднем: " + SecondsToDuration(Math.floor(MedianDuration())) + ")";
	
		const Chart_Duration = document.getElementById("Info_Chart_Duration").getContext("2d");

function RandomWithSeedGenerator(Seed){
	let V = (Seed + 61266) >>> 0;
	
	return function(){
		V ^= V << 13;
		V ^= V >> 17;
		V ^= V << 5;
		return (V >>> 0) / 4294967296;
	}
}

function ShuffleArrayWithSeed(Array, Seed){
	const Random = RandomWithSeedGenerator(Seed);
	for(let i = Array.length - 1; i > 0; i--){
		const j = Math.floor(Random() * (i + 1));
		
		const Temp = Array[i];
		Array[i] = Array[j];
		Array[j] = Temp;
	}
	return Array;
}

let SearchInput = document.getElementById("Search");

let CurrentRawText = "~~~";
function Search(){
	let RawText = SearchInput.value.trim();
	if(CurrentRawText === RawText){ return } CurrentRawText = RawText;
	
	if(RawText){
		window.location.hash = encodeURIComponent(RawText);
	} else {
		history.replaceState(null, null, " ");
	}
	
	const Parts = RawText.match(/-?(\w+:"[^"]+"|\S+)/g) || [];
	let SearchConditions = [];
	let SortMethod       = null;
	let SortReverse      = false;
	let SortSeed         = 0;
	
	for(const Part of Parts){
		let Lower = Part.toLowerCase();
		if(Lower.startsWith("sort:")){
			const SortParts = Lower.split(":");
			
			let Method = SortParts[1];
			if(Method === "name" || Method === "creation" || Method === "publish" || Method === "duration" || Method === "id" || Method === "random" || Method === "tags"){ SortMethod = Method; }
			
			if(Method === "random"){
				if(SortParts[2] && /^\d+$/.test(SortParts[2])){
					SortSeed = parseInt(SortParts[2], 10);
				}else{
					SortSeed = Date.now();
				}
			}
			
			if(SortParts[2] === "reverse" || SortParts[3] === "reverse"){ SortReverse = true; }
			continue
		}
		
		let Exclude = false;
		let OR      = false;
		let Field   = "any";
		let Value   = Part;
		
		if(Part.startsWith("-")){
			Exclude = true;
			Value   = Part.slice(1);
		}
		
		if(Part.startsWith("+")){
			OR    = true;
			Value = Part.slice(1);
		}
		
		const FieldMatch = Value.match(/^(\w+):"([^"]+)"$/)
        if(FieldMatch){
            Field = FieldMatch[1].toLowerCase();
            Value = FieldMatch[2];
        }else if(Value.startsWith("id:")){
			Field = "id";
			Value = Value.slice(3);
		}else if(Value.startsWith("tag:")){
			Field = "tag";
			Value = Value.slice(4);
		}else if(Value.startsWith("visible:")){
			Field = "visible";
			Value = Value.slice(8);
		}else if(Value.startsWith("before:")){
			Field = "before";
			Value = Value.slice(7);
		}else if(Value.startsWith("after:")){
			Field = "after";
			Value = Value.slice(6);
		}else if(Value.startsWith("publish_before:")){
			Field = "publish_before";
			Value = Value.slice(15);
		}else if(Value.startsWith("publish_after:")){
			Field = "publish_after";
			Value = Value.slice(14);
		}
		
		SearchConditions.push({Field: Field, Value: Value.toLowerCase(), Exclude: Exclude, OR: OR});
	}
	
	let FilteredVideos = (SearchConditions.length === 0 ? [...VIDEOS] : VIDEOS.filter(Video => {
		const [ID, Name, CreationDate, YoutubeID, PublishDate, Duration, Visibility, Tags, Description] = Video;
		
		function Filter(Condution){
			let M = false;
			if(Condution.Field === "name"){
				M = Name.toLowerCase().includes(Condution.Value);
			}else if(Condution.Field === "description"){
				M = Description.toLowerCase().includes(Condution.Value);
			}else if(Condution.Field === "id"){
				M = ID === parseInt(Condution.Value, 10);
			}else if(Condution.Field === "tag"){
				const TagValue = Condution.Value.toLowerCase();
				if(/^\d+$/.test(TagValue)){
					const TagID = parseInt(TagValue, 10);
					M = Tags.includes(TagID);
				}
				else {
					M = Tags.some(TagID => {
						const TagName = TAGS[TagID][0].toLowerCase();
						return TagName.includes(TagValue);
					});
				}
			}else if(Condution.Field === "visible"){
				M = Visibility === parseInt(Condution.Value, 10);
			}else if(Condution.Field === "before"){
				const VideoTime = ParseDate(CreationDate);
				const Target    = ParseDate(Condution.Value);
				M = VideoTime && Target && VideoTime <= Target;
			}else if(Condution.Field === "after"){
				const VideoTime = ParseDate(CreationDate);
				const Target    = ParseDate(Condution.Value);
				M = VideoTime && Target && VideoTime >= Target;
			}else if(Condution.Field === "publish_before"){
				const VideoTime = ParseDate(PublishDate);
				const Target    = ParseDate(Condution.Value);
				M = VideoTime && Target && VideoTime <= Target;
			}else if(Condution.Field === "publish_after"){
				const VideoTime = ParseDate(PublishDate);
				const Target    = ParseDate(Condution.Value);
				M = VideoTime && Target && VideoTime >= Target;
			}
			
			if(Condution.Exclude){ M = !M; }
			return M;
		}
		
		let ORGroup  = SearchConditions.filter(C =>  C.OR);
		let AndGroup = SearchConditions.filter(C => !C.OR);
		
		if(!AndGroup.every(C => Filter(C))){ return false; }
		if(ORGroup.length > 0 && !ORGroup.some(C => Filter(C))){ return false; }
		
		return true;
	}))
	
	if(SortMethod){
		if(SortMethod === "random"){
			ShuffleArrayWithSeed(FilteredVideos, SortSeed || 0);
		}else{
			FilteredVideos.sort((A, B) => {
				if(SortMethod === "name"){
					return A[1].localeCompare(B[1]);
				}else if(SortMethod === "creation"){
					return new Date(A[2]) - new Date(B[2]);
				}else if(SortMethod === "publish"){
					return new Date(A[4]) - new Date(B[4]);
				}else if(SortMethod === "duration"){
					const ToSeconds = T => {
						if(T === UNKNOWN_Duration || T === DEFAULT_Duration){
							return Infinity;
						}
						if(T === REALZERO_Duration){
							return 0;
						}
					
						const P = T.split(":").map(Number);
						if(P.length === 2){ return P[0] * 60 + P[1]; }
						return P[0] * 3600 + P[1] * 60 + P[2];
					}
					return ToSeconds(A[5]) - ToSeconds(B[5]);
				}else if(SortMethod === "id"){
					return A[0] - B[0];
				}else if(SortMethod === "tags"){
					return A[7].length - B[7].length;
				}
				return 0;
			})
		}

		if(SortReverse){ FilteredVideos.reverse(); }
	}
	
	UpdateContent(FilteredVideos);
}

function CheckForDuplicates(){
	const Check = new Map();
	const CheckDateDuration = new Map();
	
	const Duplicates = [];
	
	for(const Video of VIDEOS){
		const Date     = Video[2];
		const URL      = Video[3];
		const Duration = Video[5];
		
		const KeyFull = Date + "|" + URL + "|" + Duration;
		
		if(Check.has(KeyFull)){
			Duplicates.push([
				Check.get(KeyFull),
				Video,
				"Полный дубликат"
			]);
		}else{
			Check.set(KeyFull, Video);
		}
		
		const KeyDateDuration = Date + "|" + Duration;
		
		if(CheckDateDuration.has(KeyDateDuration)){
			Duplicates.push([
				CheckDateDuration.get(KeyDateDuration),
				Video,
				"По дате и длительности"
			]);
		}else{
			CheckDateDuration.set(KeyDateDuration, Video);
		}
	}
	
	if(Duplicates.length > 0){
		let Filter = "";
		function AddToFilter(ID){
			if(Filter){ Filter += " "; }
			
			Filter += "%2Bid%3A" + ID;
		}
	
		for(const Pair of Duplicates){
			const Original  = Pair[0];
			const Duplicate = Pair[1];
			
			console.log("Дубликат: " + Original[0] + " == " + Duplicate[0] + " | " + Pair[2])
			
			AddToFilter(Original [0]);
			AddToFilter(Duplicate[0]);
		}
		
		window.location.href = CurrentURL + "#" + Filter + " sort%3Acreation";
		
		throw new Error("Дубликаты найдены!");
	}else{
		console.log("Дубликаты не найдены!");
		ShowErrorNotification("Дубликаты не найдены!", "green");
	}
}

function CheckForMissingID(){
	const IDs = VIDEOS.map(v => v[0]).sort((a, b) => a - b);

	if(IDs.length === 0){
		console.log("Нет видео для проверки");
		return;
	}

	const Min = IDs[0];
	const Max = IDs[IDs.length - 1];

	const Missing = [];

	const IDSet = new Set(IDs);

	for(let i = Min; i <= Max; i++){
		if(!IDSet.has(i)){
			Missing.push(i);
		}
	}

	if(Missing.length > 0){
		console.warn("Пропущенные ID:", Missing);

		let Filter = "";
		for(const id of Missing){
			if(Filter) Filter += " ";
			Filter += "%2Bid%3A" + id;
		}

		ShowErrorNotification("Найдены пропуски ID: " + Missing.join(", "));
		
		window.location.href = CurrentURL + "#" + Filter + " sort%3Aid";
	}else{
		console.log("Пропусков нет");
		ShowErrorNotification("Пропусков ID не найдено", "green");
	}
}
