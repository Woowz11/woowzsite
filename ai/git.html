<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Проводник</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            user-select: none;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
        }

        /* Ribbon Styles */
        .ribbon-tab {
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            color: #aaa;
            cursor: pointer;
            z-index: 10;
        }
        .ribbon-tab.active {
            background-color: #2d2d2d;
            border-bottom: 2px solid #0078d7;
            color: #fff;
        }
        .ribbon-panel {
            display: none;
            background-color: #2d2d2d;
            border-bottom: 1px solid #3d3d3d;
            height: 95px;
            overflow: hidden;
        }
        .ribbon-panel.active {
            display: flex !important;
        }
        .ribbon-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s;
            min-width: 75px;
            text-align: center;
        }
        .ribbon-button:hover { background-color: rgba(255, 255, 255, 0.1); }
        .ribbon-button i, .ribbon-button svg { width: 24px; height: 24px; margin-bottom: 4px; }
        .ribbon-button span { font-size: 11px; color: #ccc; white-space: nowrap; }
        .ribbon-group-container { display: flex; flex-direction: column; border-right: 1px solid #3d3d3d; position: relative; padding-bottom: 16px; }
        .ribbon-group-label { position: absolute; bottom: 2px; left: 0; right: 0; font-size: 9px; color: #666; text-align: center; }
        .ribbon-group { display: flex; padding: 6px 4px; align-items: stretch; height: 100%; }

        /* Explorer Styles */
        .explorer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
        .file-item:hover { background-color: #323232; outline: 1px solid #454545; }
        .file-item.selected { background-color: #454545; outline: 1px solid #0078d7; }
        .file-item-list { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 6px 12px; align-items: center; font-size: 13px; border: 1px solid transparent; }
        .file-item-list:hover { background-color: #323232; }
        .file-item-list.selected { background-color: #454545; border-color: #0078d7; }
        .list-header { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 6px 12px; border-bottom: 1px solid #323232; font-size: 12px; color: #aaa; sticky; top: 0; z-index: 10; background: #1e1e1e; }

        /* Indicators - strictly on icons */
        .cached-indicator, .tree-indicator, .list-indicator {
            position: absolute !important;
            bottom: -1px !important;
            right: -1px !important;
            background-color: #ff0000 !important;
            border-radius: 50% !important;
            border: 1.5px solid #1e1e1e !important;
            z-index: 50 !important;
            display: none;
            pointer-events: none;
        }
        .cached-indicator { width: 14px !important; height: 14px !important; bottom: -2px !important; right: -2px !important; }
        .list-indicator { width: 10px !important; height: 10px !important; }
        .tree-indicator { width: 8px !important; height: 8px !important; }
        
        .icon-container { position: relative !important; }

        /* Selection */
        .selection-box { position: fixed; border: 1px solid #0078d7; background-color: rgba(0, 120, 215, 0.2); pointer-events: none; z-index: 1000; display: none; }

        /* Sidebar Tree */
        .tree-node-children { display: none; }
        .tree-node-children.open { display: block; }
        .sidebar-item.active { background-color: rgba(0, 120, 215, 0.3); border-left: 2px solid #0078d7; }

        .sidebar-resizer {
            width: 6px;
            cursor: col-resize;
            background-color: transparent;
            transition: background-color 0.2s;
            z-index: 100;
            position: relative;
        }
        .sidebar-resizer::after {
            content: "";
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            width: 2px;
            margin-left: -1px;
            background-color: #323232;
        }
        .sidebar-resizer:hover, .sidebar-resizer.resizing {
            background-color: #0078d7;
        }
        
        .is-resizing iframe, .is-selecting iframe {
            pointer-events: none !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #454545; border: 3px solid #1e1e1e; border-radius: 10px; }

        .toast-error { animation: slideDown 0.3s ease-out; background: #7a0000; border-left: 4px solid #ff0000; }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .address-bar:focus-within { border-color: #0078d7; background: #2d2d2d; }
        .breadcrumb-item:hover { background-color: rgba(255,255,255,0.1); }
        .breadcrumb-input { display: none; background: transparent; width: 100%; border: none; outline: none; color: white; }
        .address-bar.editing .breadcrumb-display { display: none; }
        .address-bar.editing .breadcrumb-input { display: block; }

        /* Interactive Cursors */
        button, input[type="checkbox"], input[type="range"], .breadcrumb-item, .sidebar-item, .file-item, .file-item-list, .ribbon-tab, .ribbon-button {
            cursor: pointer !important;
        }
        button:disabled, input:disabled { cursor: not-allowed !important; }
    </style>
</head>
<body class="h-screen overflow-hidden bg-[#1e1e1e] text-white">
    
    <div id="notifications-container" class="fixed top-0 left-0 right-0 z-[5000] flex flex-col items-center pointer-events-none p-4 space-y-2"></div>
    <iframe id="icon-service-worker" style="display:none"></iframe>

    <div id="app" class="h-full flex flex-col">
        <!-- Ribbon -->
        <div class="bg-win-dark border-b border-[#323232] flex flex-col shrink-0">
            <div class="flex items-center justify-between p-1 px-3 text-xs text-gray-300">
                <div class="flex space-x-1">
                    <button class="ribbon-tab active px-3 py-1.5" data-tab="tab-file" onclick="switchRibbonTab('tab-file', this)">Файл</button>
                    <button class="ribbon-tab px-3 py-1.5" data-tab="tab-home" onclick="switchRibbonTab('tab-home', this)">Главная</button>
                    <button class="ribbon-tab px-3 py-1.5" data-tab="tab-share" onclick="switchRibbonTab('tab-share', this)">Поделиться</button>
                    <button class="ribbon-tab px-3 py-1.5" data-tab="tab-view" onclick="switchRibbonTab('tab-view', this)">Вид</button>
                </div>
                <button class="ribbon-tab px-3 py-1.5 flex items-center" data-tab="tab-settings" onclick="switchRibbonTab('tab-settings', this)">
                    <i data-lucide="settings" class="w-3.5 h-3.5 mr-1"></i>Настройки
                </button>
            </div>

            <!-- Tab: Файл -->
            <div id="tab-file" class="ribbon-panel active">
                <div class="ribbon-group-container">
                    <div class="ribbon-group">
                        <div class="ribbon-button" onclick="showOpenOverlay()">
                            <i data-lucide="folder-plus" class="text-blue-400"></i><span>Открыть репо</span>
                        </div>
                        <div class="ribbon-button" onclick="forceReloadAll()">
                            <i data-lucide="refresh-cw" class="text-green-400"></i><span>Обновить</span>
                        </div>
                    </div>
                    <div class="ribbon-group-label">Система</div>
                </div>
            </div>

            <div id="tab-home" class="ribbon-panel">
                <div class="ribbon-group-container">
                    <div class="ribbon-group">
                        <div class="ribbon-button" onclick="selectAll()">
                            <i data-lucide="check-square" class="text-blue-400"></i><span>Выбрать всё</span>
                        </div>
                        <div class="ribbon-button" onclick="invertSelection()">
                            <i data-lucide="refresh-ccw" class="text-purple-400"></i><span>Инвертировать</span>
                        </div>
                        <div class="ribbon-button" onclick="clearSelection()">
                            <i data-lucide="square" class="text-gray-400"></i><span>Снять всё</span>
                        </div>
                    </div>
                    <div class="ribbon-group-label">Выделение</div>
                </div>
            </div>

            <div id="tab-share" class="ribbon-panel">
                <div class="ribbon-group-container">
                    <div class="ribbon-group">
                        <div class="ribbon-button" onclick="downloadAsZip('repo')">
                            <i data-lucide="archive" class="text-yellow-500"></i><span>Весь репо</span>
                        </div>
                        <div class="ribbon-button" onclick="downloadAsZip('folder')">
                            <i data-lucide="folder-archive" class="text-orange-400"></i><span>Папка</span>
                        </div>
                        <div class="ribbon-button" onclick="downloadAsZip('selection')">
                            <i data-lucide="file-archive" class="text-blue-400"></i><span>Выбранное</span>
                        </div>
                    </div>
                    <div class="ribbon-group-label">ZIP Архив</div>
                </div>
            </div>

            <div id="tab-view" class="ribbon-panel">
                <div class="ribbon-group-container">
                    <div class="ribbon-group">
                        <div class="ribbon-button" id="ribbon-view-grid" onclick="setViewMode('grid')">
                            <i data-lucide="layout-grid" class="text-blue-400"></i><span>Сетка</span>
                        </div>
                        <div class="ribbon-button" id="ribbon-view-list" onclick="setViewMode('list')">
                            <i data-lucide="list" class="text-blue-300"></i><span>Список</span>
                        </div>
                    </div>
                    <div class="ribbon-group-label">Режим</div>
                </div>
                <div class="ribbon-group-container">
                    <div class="ribbon-group">
                        <div class="grid grid-cols-2 gap-1 px-2 py-1">
                            <button class="text-[10px] bg-white/5 hover:bg-white/10 px-2 py-0.5 rounded" onclick="setSort('name')">Имя</button>
                            <button class="text-[10px] bg-white/5 hover:bg-white/10 px-2 py-0.5 rounded" onclick="setSort('size')">Размер</button>
                            <button class="text-[10px] bg-white/5 hover:bg-white/10 px-2 py-0.5 rounded" onclick="setSort('type')">Тип</button>
                            <button class="text-[10px] bg-white/5 hover:bg-white/10 px-2 py-0.5 rounded" onclick="setSort('random')">Случ.</button>
                        </div>
                        <div class="ribbon-button" onclick="toggleSortOrder()">
                            <i data-lucide="arrow-up-down" class="w-4 h-4 text-orange-400"></i><span>Инверсия</span>
                        </div>
                    </div>
                    <div class="ribbon-group-label">Сортировка</div>
                </div>
                <div class="ribbon-group-container">
                    <div class="ribbon-group flex items-center px-4">
                        <input type="range" id="zoom-slider" min="0.5" max="1.5" step="0.1" value="1" class="w-24 accent-blue-500">
                    </div>
                    <div class="ribbon-group-label">Масштаб</div>
                </div>
            </div>

            <div id="tab-settings" class="ribbon-panel">
                <div class="ribbon-group-container">
                    <div class="ribbon-group flex flex-col justify-center px-4 space-y-1">
                        <div class="flex items-center space-x-2">
                            <span class="text-[11px] text-gray-400">Token:</span>
                            <input id="settings-token" type="password" class="bg-black/20 border border-[#323232] px-2 py-0.5 rounded text-[11px] w-40 outline-none" placeholder="ghp_xxxx">
                            <button onclick="saveToken()" class="bg-blue-600 px-2 py-0.5 rounded text-[11px]">ОК</button>
                        </div>
                    </div>
                    <div class="ribbon-group-label">Авторизация</div>
                </div>
                <div class="ribbon-group-container">
                    <div class="ribbon-group flex flex-col justify-center px-4">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" id="mock-limit-checkbox" onchange="toggleMockLimit(this.checked)" class="accent-blue-500">
                            <span class="text-[11px] text-red-400">Искусственное ограничение API</span>
                        </label>
                    </div>
                    <div class="ribbon-group-label">Тест</div>
                </div>
            </div>

            <!-- Address Bar Row -->
            <div class="flex items-center p-2 space-x-2 bg-[#2d2d2d]">
                <div class="flex space-x-1 pr-2 border-r border-[#3d3d3d]">
                    <button onclick="goBack()" id="btn-back" class="p-1 hover:bg-white/10 rounded disabled:opacity-20" disabled><i data-lucide="arrow-left" class="w-4 h-4"></i></button>
                    <button onclick="goForward()" id="btn-forward" class="p-1 hover:bg-white/10 rounded disabled:opacity-20" disabled><i data-lucide="arrow-right" class="w-4 h-4"></i></button>
                    <button onclick="goUp()" id="btn-up" class="p-1 hover:bg-white/10 rounded disabled:opacity-20" disabled><i data-lucide="arrow-up" class="w-4 h-4"></i></button>
                </div>
                <div id="address-bar-container" class="flex-1 flex items-center bg-[#1e1e1e] border border-[#3d3d3d] px-2 py-0.5 rounded-sm address-bar overflow-hidden">
                    <i data-lucide="folder" class="w-4 h-4 text-yellow-500 mr-2 shrink-0"></i>
                    <div class="flex items-center flex-1 h-full overflow-hidden">
                        <span id="address-repo-label" onclick="navigateTo('')" class="text-gray-500 font-bold text-sm whitespace-nowrap mr-1 select-none cursor-pointer hover:text-blue-400 transition-colors"></span>
                        <span class="text-gray-600 mr-2 shrink-0 select-none">/</span>
                        <div id="breadcrumb-container" class="flex-1 flex items-center overflow-hidden text-sm h-full breadcrumb-display"></div>
                        <input id="address-input" type="text" class="flex-1 breadcrumb-input text-sm bg-transparent border-none outline-none text-white h-full" placeholder="путь в репозитории">
                    </div>
                    <button onclick="navigateTo(currentPath, false, true)" class="ml-2 hover:bg-white/10 p-0.5 rounded shrink-0"><i data-lucide="refresh-cw" class="w-3 h-3 text-gray-400"></i></button>
                </div>
                <div class="w-64 flex items-center bg-[#1e1e1e] border border-[#3d3d3d] px-2 py-0.5 rounded-sm">
                    <input id="search-input" type="text" class="flex-1 outline-none text-sm bg-transparent" placeholder="Поиск...">
                    <i data-lucide="search" class="w-3 h-3 text-gray-400"></i>
                </div>
            </div>
        </div>

        <!-- Main Body -->
        <div class="flex-1 flex overflow-hidden">
            <aside id="sidebar" class="w-64 bg-[#1e1e1e] border-r border-[#323232] overflow-y-auto pt-2 shrink-0">
                <div id="sidebar-tree"></div>
            </aside>
            <div id="sidebar-resizer" class="sidebar-resizer shrink-0"></div>
            <main id="explorer-content" class="flex-1 bg-[#1e1e1e] overflow-y-auto relative"></main>
        </div>

        <!-- Footer -->
        <div class="bg-[#2d2d2d] border-t border-[#323232] px-4 py-1 text-[11px] flex justify-between items-center text-gray-400 shrink-0">
            <div class="flex items-center space-x-4">
                <div id="status-left">0 элементов</div>
                <div class="border-l border-[#3d3d3d] h-3"></div>
                <div id="api-limit" class="flex items-center">
                    <i data-lucide="activity" class="w-3 h-3 mr-1"></i><span>Лимит: -- / --</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div id="status-selection"></div>
                <div class="flex space-x-1">
                    <button id="btn-status-grid" class="p-1 hover:text-white"><i data-lucide="layout-grid" class="w-3.5 h-3.5"></i></button>
                    <button id="btn-status-list" class="p-1 hover:text-white"><i data-lucide="list" class="w-3.5 h-3.5"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Overlay -->
    <div id="setup-overlay" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[3000] backdrop-blur-md">
        <div class="bg-[#2d2d2d] rounded-lg shadow-2xl p-6 w-[500px] border border-[#3d3d3d]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold flex items-center text-blue-400"><i data-lucide="layout" class="mr-2"></i>GitHub Explorer</h2>
                <button id="overlay-close-x" class="p-1 hover:bg-white/10 rounded hidden" onclick="hideOpenOverlay()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="text-xs text-gray-400 uppercase font-bold mb-2 block">Репозиторий</label>
                    <div class="relative">
                        <input type="text" id="repo-input" class="w-full bg-[#1e1e1e] border border-[#3d3d3d] p-3 rounded outline-blue-500 pl-10 text-white" value="Woowz11/woowzsite">
                        <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-gray-500"></i>
                    </div>
                </div>
                <div class="bg-black/20 p-4 rounded border border-[#3d3d3d]">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs text-gray-400 uppercase font-bold">GitHub Token</label>
                        <button onclick="saveTokenFromOverlay()" class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded text-[10px] hover:bg-blue-600/40">Применить</button>
                    </div>
                    <input id="overlay-token" type="password" class="w-full bg-[#1e1e1e] border border-[#3d3d3d] p-2 rounded text-sm text-white outline-none focus:border-blue-500" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase font-bold mb-2 block">Недавние</label>
                    <div id="recent-repos-list" class="grid grid-cols-2 gap-2 max-h-32 overflow-y-auto"></div>
                </div>
            </div>
            <div class="flex space-x-3 mt-8">
                <button id="overlay-cancel-btn" class="flex-1 bg-white/5 py-3 rounded font-bold hidden hover:bg-white/10" onclick="hideOpenOverlay()">Отмена</button>
                <button id="btn-open-repo" class="flex-[2] bg-blue-600 py-3 rounded font-bold hover:bg-blue-700 shadow-lg" onclick="handleOpenRepo()">Открыть</button>
            </div>
        </div>
    </div>

    <div id="properties-modal" class="fixed inset-0 z-[4000] hidden flex items-center justify-center backdrop-blur-sm bg-black/50">
        <div class="bg-[#2d2d2d] border border-[#454545] rounded-lg shadow-2xl w-[400px] overflow-hidden flex flex-col">
            <div class="bg-[#383838] px-4 py-2 border-b border-[#454545] flex justify-between items-center">
                <div class="flex items-center space-x-2"><i data-lucide="info" class="w-4 h-4 text-blue-400"></i><span class="text-sm font-semibold text-gray-200">Свойства</span></div>
                <button onclick="closeProperties()" class="text-gray-500 hover:text-white transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="properties-content" class="p-6 space-y-4 text-sm text-gray-300"></div>
            <div class="bg-[#2d2d2d] px-4 py-3 border-t border-[#454545] flex justify-end">
                <button onclick="closeProperties()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-1.5 rounded transition-colors text-xs font-semibold">ОК</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="hidden fixed bg-[#2d2d2d] border border-win shadow-xl py-1 z-[100] text-sm min-w-48 rounded text-gray-200">
        <div class="px-3 py-1.5 hover:bg-blue-600 hover:text-white cursor-pointer flex items-center" id="cm-open"><i data-lucide="external-link" class="w-4 h-4 mr-2"></i> Открыть</div>
        <div class="px-3 py-1.5 hover:bg-blue-600 hover:text-white cursor-pointer flex items-center" id="cm-copy"><i data-lucide="copy" class="w-4 h-4 mr-2"></i> Копировать путь</div>
        <div class="border-t border-[#454545] my-1"></div>
        <div class="px-3 py-1.5 hover:bg-blue-600 hover:text-white cursor-pointer flex items-center" id="cm-properties"><i data-lucide="info" class="w-4 h-4 mr-2"></i> Свойства</div>
    </div>

    <template id="preview-template">
        <div class="flex-1 flex flex-col h-full bg-[#0d0d0d]">
            <div id="preview-body" class="flex-1 overflow-hidden relative bg-[#0d0d0d]"></div>
        </div>
    </template>

    <script>
        // Global Fallback
        let FALLBACK_ICON = {
            svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
            color: '#666666'
        };

        // State
        let currentRepo = '';
        let currentPath = '';
        let history = [];
        let historyIndex = -1;
        let files = [];
        let filteredFiles = [];
        let selectedFiles = new Set();
        let lastSelectedIndex = null;
        let viewMode = 'grid';
        let rightClickedFile = null;
        let sortField = 'name';
        let sortOrder = 'asc';
        let currentError = null;
        let mockApiLimit = false;
        const apiCache = new Map();
        const iconCache = new Map();
        const CACHE_TTL = 10 * 60 * 1000;
        let recentRepos = JSON.parse(localStorage.getItem('recentRepos') || '["Woowz11/woowzsite", "Woowz11/GitExplorer-test", "xeor/test_files", "ffeast/samplelib"]');
        let isIconServiceReady = false;

        const explorerContent = document.getElementById('explorer-content');
        const sidebarTree = document.getElementById('sidebar-tree');
        const setupOverlay = document.getElementById('setup-overlay');
        const repoInput = document.getElementById('repo-input');
        const addressBar = document.getElementById('address-bar-container');
        const breadcrumbContainer = document.getElementById('breadcrumb-container');
        const addressInput = document.getElementById('address-input');
        const searchInput = document.getElementById('search-input');
        const statusSelection = document.getElementById('status-selection');
        const statusLeft = document.getElementById('status-left');
        const selectionBox = document.getElementById('selection-box');
        const iconServiceIframe = document.getElementById('icon-service-worker');

        // Ribbon
        window.switchRibbonTab = function(tabId, element) {
            document.querySelectorAll('.ribbon-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.ribbon-tab').forEach(t => t.classList.remove('active'));
            const panel = document.getElementById(tabId);
            if (panel) { panel.classList.add('active'); if (element) element.classList.add('active'); else document.querySelector(`[data-tab="${tabId}"]`)?.classList.add('active'); }

        async function downloadAsZip(mode) {
            if (!currentRepo) return; const zip = new JSZip(); const token = localStorage.getItem('github_token') || ''; const headers = token ? { 'Authorization': `token ${token}` } : {};
            let filesToDownload = []; let zipName = 'download.zip';
            const status = document.createElement('div'); status.className = 'fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-blue-600 text-white p-6 rounded-lg z-[3000] shadow-2xl text-center min-w-[300px] border border-blue-400';

                    const f = filesToDownload[i]; status.querySelector('p').innerHTML = `Скачивание (${i + 1}/${filesToDownload.length})`;

            const ext = isDir ? 'folder' : (fileName.includes('.') ? fileName.split('.').pop().toLowerCase() : fileName.toLowerCase());
            if (iconCache.has(ext)) { updateIconsInDOM(ext); return; }
            if (!isIconServiceReady) { setTimeout(() => requestIcon(fileName, isDir), 500); return; }
            iconServiceIframe.contentWindow.postMessage({ type: 'FILE_INFO_REQUEST', fileName: isDir ? 'folder' : fileName }, '*');
            setTimeout(() => { if (!iconCache.has(ext)) { iconCache.set(ext, FALLBACK_ICON); updateIconsInDOM(ext); } }, 5000);
        }

        function updateIconsInDOM(ext) {
            const data = iconCache.get(ext) || FALLBACK_ICON;
            const token = localStorage.getItem('github_token') || '';
            
            document.querySelectorAll(`[data-ext="${ext}"]`).forEach(container => {
                const path = container.getAttribute('data-path') || container.closest('[data-path]')?.getAttribute('data-path');
                const url = `https://api.github.com/repos/${currentRepo}/contents/${path}`;
                const isCachedFolder = Array.isArray(apiCache.get(`${url}_${token}`)?.data);

                // Заменяем иконку
                container.innerHTML = (data.svg && data.svg.includes('<svg')) ? data.svg : FALLBACK_ICON.svg;
                const svg = container.querySelector('svg');
                if (svg) {
                    svg.style.color = data.color || FALLBACK_ICON.color;
                    svg.style.width = '100%';
                    svg.style.height = '100%';
                }

                // Перерисовываем индикатор кеша сразу после замены иконки
                if (isCachedFolder) {
                    const dot = document.createElement('div');
                    // Сетка (Grid) имеет класс w-12. Иерархия имеет mx-1. Список - остальное.
                    if (container.classList.contains('w-12')) {
                        dot.className = 'cached-indicator';
                    } else if (container.classList.contains('mx-1')) {
                        dot.className = 'tree-indicator';
                    } else {
                        dot.className = 'list-indicator';
                    }
                    dot.style.display = 'inline-block';
                    container.appendChild(dot);
                }
            });
        }

        window.closeProperties = function() {
            document.getElementById('properties-modal').classList.add('hidden');
        };

        document.getElementById('cm-properties').onclick = () => {
            if (rightClickedFile) {
                const modal = document.getElementById('properties-modal');
                const content = document.getElementById('properties-content');
                const f = rightClickedFile;
                
                const isDir = f.type === 'dir' || f.type === 'tree';
                const ext = f.name.includes('.') ? f.name.split('.').pop().toLowerCase() : (isDir ? 'folder' : 'unknown');
                const iconData = iconCache.get(ext) || FALLBACK_ICON;
                
                const sizeFull = f.size ? `${f.size.toLocaleString()} байт` : '0 байт';
                const sizeKb = f.size ? `(${(f.size/1024).toFixed(2)} КБ)` : '';

                content.innerHTML = `
                    <div class="flex items-center space-x-4 mb-6">
                        <div class="w-12 h-12 flex items-center justify-center bg-black/20 rounded relative">
                            <div class="w-10 h-10 flex items-center justify-center">${iconData.svg}</div>
                        </div>
                        <div class="overflow-hidden">
                            <div class="font-bold text-white truncate text-lg">${f.name}</div>
                            <div class="text-xs text-gray-500">${isDir ? 'Папка с файлами' : 'Файл ' + ext.toUpperCase()}</div>
                        </div>
                    </div>
                    <div class="space-y-3 border-t border-[#454545] pt-4">
                        <div class="flex justify-between">
                            <span class="text-gray-500">Тип:</span> 
                            <span class="text-gray-200">${isDir ? 'Папка' : ext.toUpperCase() + ' файл'}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500 text-nowrap">Путь:</span> 
                            <span class="text-gray-200 truncate ml-8 text-right select-text" title="${f.path}">${f.path || '/'}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">Размер:</span> 
                            <span class="text-gray-200">${sizeFull} ${sizeKb}</span>
                        </div>
                    </div>
                    <div class="space-y-2 border-t border-[#454545] pt-4">
                        <div class="text-gray-500 mb-1 uppercase font-bold text-[10px] tracking-wider">GitHub Metadata</div>
                        <div class="flex justify-between">
                            <span class="text-gray-500 text-[10px]">SHA:</span>
                            <code class="text-blue-400 break-all select-text bg-black/20 p-1.5 rounded text-[10px] font-mono border border-white/5">${f.sha || 'N/A'}</code>
                        </div>
                        <div class="flex justify-end mt-2">
                            <a href="${f.html_url}" target="_blank" class="text-blue-400 hover:text-blue-300 transition-colors text-[11px] flex items-center">
                                <i data-lucide="external-link" class="w-3 h-3 mr-1"></i> Посмотреть на GitHub
                            </a>
                        </div>
                    </div>
                `;
                
                const svg = content.querySelector('svg');
                if (svg) { 
                    svg.style.color = iconData.color || FALLBACK_ICON.color; 
                    svg.style.width = '100%'; 
                    svg.style.height = '100%'; 
                }
                
                modal.classList.remove('hidden');
                lucide.createIcons();
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            initIconService();
            
            document.querySelectorAll('.ribbon-tab').forEach(tab => {
                tab.addEventListener('click', () => switchRibbonTab(tab.dataset.tab, tab));
            });

            showOpenOverlay();
            setViewMode('grid');

            const gridBtn = document.getElementById('btn-status-grid');
            const listBtn = document.getElementById('btn-status-list');
            if (gridBtn) gridBtn.addEventListener('click', () => setViewMode('grid'));
            if (listBtn) listBtn.addEventListener('click', () => setViewMode('list'));

            const zoomSlider = document.getElementById('zoom-slider');
            if (zoomSlider) zoomSlider.addEventListener('input', () => renderFiles());

            initSidebarResizer();

            let sX, sY, drag = false;
            explorerContent.addEventListener('mousedown', (e) => {
                if (e.button !== 0 || e.target.closest('button, input, .file-item, .file-item-list') || currentError) return;
                drag = true; 
                document.body.classList.add('is-selecting');
                sX = e.clientX; sY = e.clientY;
                selectionBox.style.left = sX + 'px';
                selectionBox.style.top = sY + 'px';
                selectionBox.style.width = '0';
                selectionBox.style.height = '0';
            });

            window.addEventListener('mousemove', (e) => {
                if (!drag) return;
                selectionBox.style.display = 'block';
                const left = Math.min(sX, e.clientX);
                const top = Math.min(sY, e.clientY);
                selectionBox.style.left = left + 'px';
                selectionBox.style.top = top + 'px';
                selectionBox.style.width = Math.abs(e.clientX - sX) + 'px';
                selectionBox.style.height = Math.abs(e.clientY - sY) + 'px';

                const rect = selectionBox.getBoundingClientRect();
                explorerContent.querySelectorAll('.file-item, .file-item-list').forEach(item => {
                    const r = item.getBoundingClientRect();
                    const inter = !(r.right < rect.left || r.left > rect.right || r.bottom < rect.top || r.top > rect.bottom);
                    const idx = parseInt(item.dataset.index);
                    if (inter) selectedFiles.add(idx);
                    else if (!e.ctrlKey) selectedFiles.delete(idx);
                });
                renderFiles();
                updateStatus();
            });

            window.addEventListener('mouseup', () => {
                drag = false;
                document.body.classList.remove('is-selecting');
                selectionBox.style.display = 'none';
            });
        });

        function initSidebarResizer() {
            const sidebar = document.getElementById('sidebar'); 
            const resizer = document.getElementById('sidebar-resizer'); 
            let isResizing = false;
            
            resizer.onmousedown = () => { 
                isResizing = true; 
                resizer.classList.add('resizing'); 
                document.body.classList.add('is-resizing');
                document.body.style.cursor = 'col-resize'; 
                document.body.style.userSelect = 'none'; 
            };
            
            window.addEventListener('mousemove', (e) => { 
                if (!isResizing) return; 
                let nw = e.clientX; 
                if (nw < 150) nw = 150; 
                if (nw > 600) nw = 600; 
                sidebar.style.width = `${nw}px`; 
            });
            
            window.addEventListener('mouseup', () => { 
                if (!isResizing) return; 
                isResizing = false; 
                resizer.classList.remove('resizing'); 
                document.body.classList.remove('is-resizing');
                document.body.style.cursor = ''; 
                document.body.style.userSelect = ''; 
            });
        }
    </script>
</body>
</html>
