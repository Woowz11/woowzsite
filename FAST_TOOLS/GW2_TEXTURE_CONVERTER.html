<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GW2 Texture Studio</title>
    <style>
        :root {
            --bg: #0f0f12;
            --card: #18181b;
            --accent: #22d3ee;
            --accent-hover: #0891b2;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
            --border: #27272a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--card);
        }

        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: var(--accent); }

        main {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        section {
            flex: 1;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            min-width: 0;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 8px;
            border: 2px dashed var(--border);
            overflow: auto;
            position: relative;
            background-image:
                    linear-gradient(45deg, #111 25%, transparent 25%),
                    linear-gradient(-45deg, #111 25%, transparent 25%),
                    linear-gradient(45deg, transparent 75%, #111 75%),
                    linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
        }

        .canvas-container::after {
            content: "Вставьте Ctrl+V";
            position: absolute;
            color: var(--text-dim);
            font-size: 0.8rem;
            opacity: 0.3;
        }

        .has-image::after { display: none; }

        canvas { image-rendering: pixelated; max-width: 100%; position: relative; z-index: 1; }

        .info-panel {
            display: flex;
            justify-content: space-between;
            background: var(--bg);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .info-panel b { color: var(--accent); }

        textarea {
            width: 100%;
            height: 80px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: #10b981;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 0.75rem;
            resize: none;
            box-sizing: border-box;
        }

        input[type="file"] { display: none; }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .btn:hover { background: var(--accent-hover); }

        .btn-alt { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

        .column-title {
            font-size: 1rem;
            font-weight: bold;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>GW2 TEXTURE STUDIO <small style="opacity: 0.5;">v2.2 FIX</small></h1>
</header>

<main>
    <!-- ЭНКОДЕР -->
    <section>
        <div class="column-title">Кодирование (PNG → String)</div>
        <label class="btn" for="up">ВЫБРАТЬ ФАЙЛ</label>
        <input type="file" id="up" accept="image/png">

        <div class="canvas-container" id="container_up">
            <canvas id="can_up"></canvas>
        </div>

        <div class="info-panel" id="info_up">
            <span>Размер: <b>0x0</b></span>
            <span>Alpha: <b>-</b></span>
            <span>Итого: <b>0 chars</b></span>
        </div>

        <textarea id="out_str" readonly placeholder="Результат..."></textarea>
        <button class="btn btn-alt" onclick="copy()">КОПИРОВАТЬ</button>
    </section>

    <!-- ДЕКОДЕР -->
    <section>
        <div class="column-title">Декодирование (String → Preview)</div>
        <textarea id="in_str" placeholder="Вставьте строку..."></textarea>
        <button class="btn" onclick="decompress()">ДЕКОДИРОВАТЬ</button>

        <div class="canvas-container" id="container_down">
            <canvas id="can_down"></canvas>
        </div>

        <div class="info-panel" id="info_down">
            <span>Размер: <b>0x0</b></span>
            <span>Alpha: <b>-</b></span>
            <span>Формат: <b>-</b></span>
        </div>
    </section>
</main>

<script>
    const GW2_Alpha = { 0: "None", 1: "Cutout", 2: "Transparent" };

    async function compress(data) {
        const stream = new Blob([data]).stream();
        const compressedStream = stream.pipeThrough(new CompressionStream("gzip"));
        const response = new Response(compressedStream);
        const buffer = await response.arrayBuffer();
        return btoa(String.fromCharCode(...new Uint8Array(buffer)));
    }

    async function decompressData(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const stream = new Blob([bytes]).stream();
        const decompressedStream = stream.pipeThrough(new DecompressionStream("gzip"));
        const response = new Response(decompressedStream);
        const buffer = await response.arrayBuffer();
        return new Uint8Array(buffer);
    }

    async function handleImage(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = async () => {
                const cvs = document.getElementById('can_up');
                const ctx = cvs.getContext('2d');
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                document.getElementById('container_up').classList.add('has-image');

                const imgData = ctx.getImageData(0, 0, img.width, img.height).data;

                let alphaType = 0;
                for(let i=3; i<imgData.length; i+=4) {
                    if(imgData[i] < 255) {
                        alphaType = Math.max(alphaType, imgData[i] === 0 ? 1 : 2);
                    }
                }

                const isRGBA = alphaType !== 0;
                const bpp = isRGBA ? 4 : 3;
                const raw = new Uint8Array(5 + (img.width * img.height * bpp));

                raw[0] = (img.width >> 8) & 0xFF;
                raw[1] = img.width & 0xFF;
                raw[2] = (img.height >> 8) & 0xFF;
                raw[3] = img.height & 0xFF;
                raw[4] = alphaType;

                let off = 5;
                for(let i=0; i < imgData.length; i += 4) {
                    raw[off++] = imgData[i];   // R
                    raw[off++] = imgData[i+1]; // G
                    raw[off++] = imgData[i+2]; // B
                    if(isRGBA) raw[off++] = imgData[i+3]; // A
                }

                const compressed = await compress(raw);
                document.getElementById('out_str').value = compressed;
                document.getElementById('info_up').innerHTML = `
                    <span>Размер: <b>${img.width}x${img.height}</b></span>
                    <span>Alpha: <b>${GW2_Alpha[alphaType]}</b></span>
                    <span>Вес: <b>${compressed.length} chars</b></span>
                `;
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function decompress() {
        try {
            const str = document.getElementById('in_str').value.trim();
            const bytes = await decompressData(str);

            const w = (bytes[0] << 8) | bytes[1];
            const h = (bytes[2] << 8) | bytes[3];
            const alpha = bytes[4];
            const isRGBA = alpha !== 0;

            const cvs = document.getElementById('can_down');
            const ctx = cvs.getContext('2d');
            cvs.width = w; cvs.height = h;
            document.getElementById('container_down').classList.add('has-image');

            const imgData = ctx.createImageData(w, h);
            const dst = imgData.data;

            let srcOff = 5;
            let dstOff = 0;

            // КОРРЕКТНОЕ ЧТЕНИЕ: RGB -> RGBA или RGBA -> RGBA
            for (let i = 0; i < w * h; i++) {
                dst[dstOff++] = bytes[srcOff++]; // R
                dst[dstOff++] = bytes[srcOff++]; // G
                dst[dstOff++] = bytes[srcOff++]; // B
                if (isRGBA) {
                    dst[dstOff++] = bytes[srcOff++]; // A
                } else {
                    dst[dstOff++] = 255; // Заполняем альфу 255, если в исходнике её нет
                }
            }

            ctx.putImageData(imgData, 0, 0);
            document.getElementById('info_down').innerHTML = `
                <span>Размер: <b>${w}x${h}</b></span>
                <span>Alpha: <b>${GW2_Alpha[alpha]}</b></span>
                <span>Формат: <b>${isRGBA ? 'RGBA' : 'RGB'}</b></span>
            `;
        } catch (e) { alert("Ошибка данных"); }
    }

    window.addEventListener('paste', e => handleImage(e.clipboardData.files[0]));
    document.getElementById('up').onchange = e => handleImage(e.target.files[0]);

    function copy() {
        const area = document.getElementById('out_str');
        area.select();
        document.execCommand('copy');
    }
</script>
</body>
</html>
