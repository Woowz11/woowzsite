	// ===================================================================

	// ===================================================================
	(function() {
		const TRAIL_LENGTH = 64;
		const TRAIL_SIZE = 16;

		const COLORS = [
			"red", "lime"
		];

		const SYMBOLS = ['0', '1'];

		let trail = [];
		let cursor = ""
		let cursorX = window.innerWidth / 2;
		let cursorY = window.innerHeight / 2;
		let positions = [];

		var CACHE = document.createElement("div")
		document.body.appendChild(CACHE)

		for (let i = 0; i < TRAIL_LENGTH; i++) {
			const dot = document.createElement('div');
			const size = TRAIL_SIZE * (1 - i / TRAIL_LENGTH * 0.6);
			const color = COLORS[Math.floor(Math.random() * COLORS.length)];

			dot.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
			dot.style.cssText = `
                position: fixed;
                font-size: ${size}px;
                font-family: 'Courier New', monospace;
                font-weight: 900;
                color: ${color};
                pointer-events: none;
                z-index: 999999;
                opacity: ${1 - (i / TRAIL_LENGTH) * 0.85};
                mix-blend-mode: screen;
                filter: blur(${i < 3 ? 0 : (i / TRAIL_LENGTH) * 1.5}px);
                transition: all 0.04s cubic-bezier(0.2, 0.9, 0.4, 1);
                text-shadow: 0 0 ${size * 0.8}px ${color}66, 0 0 ${size * 2}px ${color}22;
                will-change: transform;
                line-height: 1;
                user-select: none;
            `;
			CACHE.appendChild(dot);
			trail.push(dot);
			positions.push({ x: cursorX, y: cursorY });
		}

		function update() {
			positions.unshift({ x: cursorX, y: cursorY });
			if (positions.length > TRAIL_LENGTH) positions.pop();

			for (let i = 0; i < trail.length; i++) {
				if (i < positions.length) {
					const pos = positions[i];
					trail[i].style.left = pos.x + 'px';
					trail[i].style.top = pos.y + 'px';

					let glitchX = 0, glitchY = 0;
					if (i > 3 && i % 2 === 0) {
						glitchX = (Math.random() - 0.5) * (i / 2);
						glitchY = (Math.random() - 0.5) * (i / 2);
					}

					let Symbol = trail[i].innerHTML

					if(cursor.includes("notallow")){
						Symbol = "卐"
					}else if(cursor.includes("text")){
						Symbol = "HI, WELCOME HERE!"
					}else if(cursor.includes("grab")){
						Symbol = "<img src='../source/whitesponge.ico'></img>"
					}else{
						Symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]
					}

					trail[i].innerHTML = Symbol

					const scale = 1 - (i / TRAIL_LENGTH) * 0.9;
					trail[i].style.transform = `translate(-50%, -50%) translate(${glitchX}px, ${glitchY}px) scale(${scale})`;
				}
			}

			requestAnimationFrame(update);
		}

		document.addEventListener('mousemove', function(e) {
			let X = e.clientX
			let Y = e.clientY

			const ElementFromCursor = document.elementFromPoint(X, Y)
			cursor = ElementFromCursor ? getComputedStyle(ElementFromCursor).cursor : ""

			if(cursor.includes("pointer")){
				X += 5;
			}else if(cursor.includes("text")){
				X += (Math.random()-0.5)*2*500;
				Y += (Math.random()-0.5)*2*500;
			}else if(cursor.includes("grab")){
				X += (Math.random()-0.5)*2*3000;
				Y += (Math.random()-0.5)*2*3000;
			}

			cursorX = X;
			cursorY = Y;
		});

		update();
	})();
}

function FUNC_DOWNLOADFILE(name, content){
	const blob = new Blob([content], {type: "text/plain"});
	const url = URL.createObjectURL(blob);
	const a = document.createElement("a");
	a.href = url;
	a.download = name;
	document.body.appendChild(a);
	a.click();
	document.body.removeChild(a);
	URL.revokeObjectURL(url);

function GetAllLithiumArts(){
    var result = "";

	for (let i = LithiumArts.length - 1; i > 0; i--) {
		const j = Math.floor(Math.random() * (i + 1));
		[LithiumArts[i], LithiumArts[j]] = [LithiumArts[j], LithiumArts[i]];
	}

    LithiumArts.forEach(function(name){
        let fullpath = "../" + name;
        let ext = name.split('.').pop().toLowerCase();
        let scale = 0.75 + Math.random() * 0.5; // масштабирование от 0.75 до 1.25

        let className = `class="art-item" style="transform: scale(${scale});"`;

        if (["png", "jpg", "jpeg", "webp", "gif"].includes(ext)) {
            result += `<div ${className}><img src="${fullpath}" class="art-img"></div>`;
        } else if (["mp4", "webm", "ogg"].includes(ext)) {
            result += `<div ${className}><video src="${fullpath}" controls class="art-img"></video></div>`;
        } else if (["mp3", "wav"].includes(ext)) {
            result += `<div ${className}><audio src="${fullpath}" controls class="art-audio"></audio></div>`;
        } else {
            result += `<div ${className}>${fullpath}</div>`;
        }
    });

    return result;
}

				if (!wrapper) return;

				// Скрываем контроллеры
				if (controls) {
					controls.classList.remove('visible');
				}

				if (img) {
					// Полностью сбрасываем все стили картинки
					img.style.transform = '';
					img.style.filter = '';
					img.style.maxWidth = '85vw';
					img.style.maxHeight = '70vh';
					img.style.width = '';
					img.style.height = '';
				}

				if (indicator) {
					indicator.style.opacity = '0';
				}
				if (info) {
					info.style.opacity = '1';
					info.style.pointerEvents = 'auto';
				}

				isPanning = false;
				wrapper.style.cursor = 'url("../source/lit_cur_pointer.cur"), auto';

				// Сбрасываем значения слайдеров на дефолтные
				document.getElementById('filterBrightness').value = 100;
				document.getElementById('filterSaturate').value = 100;
				document.getElementById('filterInvert').value = 0;
				document.getElementById('filterHue').value = 0;
				document.getElementById('filterBlur').value = 0;
				document.getElementById('filterScaleX').value = 100;
				document.getElementById('filterScaleY').value = 100;

				// Обновляем отображение значений
				const valBrightness = document.getElementById('filterBrightnessVal');
				const valSaturate = document.getElementById('filterSaturateVal');
				const valInvert = document.getElementById('filterInvertVal');
				const valHue = document.getElementById('filterHueVal');
				const valBlur = document.getElementById('filterBlurVal');
				const valScaleX = document.getElementById('filterScaleXVal');
				const valScaleY = document.getElementById('filterScaleYVal');

				if (valBrightness) valBrightness.textContent = '100%';
				if (valSaturate) valSaturate.textContent = '100%';
				if (valInvert) valInvert.textContent = '0%';
				if (valHue) valHue.textContent = '0°';
				if (valBlur) valBlur.textContent = '0px';
				if (valScaleX) valScaleX.textContent = '100%';
				if (valScaleY) valScaleY.textContent = '100%';

				// Сбрасываем zoom и translate
				zoomScale = 1;
				translateX = 0;
				translateY = 0;
			}

			// ===== ЗАКРЫТИЕ ПО КЛИКУ НА ФОН =====
			function GALLERY_closeOnBackground(e) {
				const modal = document.getElementById('lituismModal');
				const wrapper = document.getElementById('modalImgWrapper');

				if (!modal) return;

				if (e.target === modal) {
					// Если зум включен — НИЧЕГО НЕ ДЕЛАЕМ! Только крестик!
					if (wrapper && wrapper.classList.contains('zoomed')) {
						return; // ИГНОРИРУЕМ клик по фону в режиме лупы
					} else {
						// Если зума нет — закрываем модалку
						GALLERY_closeModalNow();
					}
				}
			}

// ===================================================================
//  ОБНОВЛЕНИЕ ФИЛЬТРОВ КАРТИНКИ
// ===================================================================
			function GALLERY_updateFilters() {
				const img = document.getElementById('lituismModalImg');
				if (!img) return;

				const brightness = document.getElementById('filterBrightness')?.value || 100;
				const saturate = document.getElementById('filterSaturate')?.value || 100;
				const invert = document.getElementById('filterInvert')?.value || 0;
				const hue = document.getElementById('filterHue')?.value || 0;
				const blur = document.getElementById('filterBlur')?.value || 0;
				const scaleX = document.getElementById('filterScaleX')?.value || 100;
				const scaleY = document.getElementById('filterScaleY')?.value || 100;

				// Обновляем значения на слайдерах
				const valBrightness = document.getElementById('filterBrightnessVal');
				const valSaturate = document.getElementById('filterSaturateVal');
				const valInvert = document.getElementById('filterInvertVal');
				const valHue = document.getElementById('filterHueVal');
				const valBlur = document.getElementById('filterBlurVal');
				const valScaleX = document.getElementById('filterScaleXVal');
				const valScaleY = document.getElementById('filterScaleYVal');

				if (valBrightness) valBrightness.textContent = brightness + '%';
				if (valSaturate) valSaturate.textContent = saturate + '%';
				if (valInvert) valInvert.textContent = invert + '%';
				if (valHue) valHue.textContent = hue + '°';
				if (valBlur) valBlur.textContent = blur + 'px';
				if (valScaleX) valScaleX.textContent = scaleX + '%';
				if (valScaleY) valScaleY.textContent = scaleY + '%';

				// Применяем фильтры к картинке
				img.style.filter = `brightness(${brightness}%) saturate(${saturate}%) invert(${invert}%) hue-rotate(${hue}deg) blur(${blur}px)`;

				// СОХРАНЯЕМ ТЕКУЩИЕ ЗНАЧЕНИЯ SCALEX И SCALEY
				// transform = zoom * translate + scaleX * scaleY
				img.style.transform = `scale(${zoomScale}) translate(${translateX}px, ${translateY}px) scaleX(${scaleX/100}) scaleY(${scaleY/100})`;
			}

// ===================================================================
//  СБРОС ВСЕХ ФИЛЬТРОВ
// ===================================================================
			function GALLERY_resetFilters() {
				document.getElementById('filterBrightness').value = 100;
				document.getElementById('filterSaturate').value = 100;
				document.getElementById('filterInvert').value = 0;
				document.getElementById('filterHue').value = 0;
				document.getElementById('filterBlur').value = 0;
				document.getElementById('filterScaleX').value = 100;
				document.getElementById('filterScaleY').value = 100;
				GALLERY_updateFilters();
			}

// ===================================================================
//  ПОКАЗАТЬ/СКРЫТЬ КОНТРОЛЛЕРЫ ФИЛЬТРОВ
// ===================================================================
			function GALLERY_toggleFilters() {
				const controls = document.getElementById('filterControls');
				if (!controls) return;
				controls.classList.toggle('visible');
			}

			// ===================================================================
			//  ИНИЦИАЛИЗАЦИЯ (ЗАПУСКАЕТСЯ КАЖДЫЙ РАЗ ПРИ OPEN_PAGE)
			// ===================================================================

			// Дизайн
			const design = GALLERY_randomDesign();
			GALLERY_applyDesign(design);

			// Рендер
			GALLERY_render();

			// Кнопка перетасовки
			const reloadBtn = document.getElementById('lituismReloadBtn');
			if (reloadBtn) {
				reloadBtn.onclick = function() {
					const grid = document.getElementById('lituismGrid');
					if (grid) {
						grid.style.transition = 'all 0.1s ease';
						grid.style.opacity = '0.2';
						grid.style.transform = 'scale(0.98)';

						const newDesign = GALLERY_randomDesign();
						GALLERY_applyDesign(newDesign);

						setTimeout(function() {
							GALLERY_render();
							grid.style.opacity = '1';
							grid.style.transform = 'scale(1)';
						}, 150);
					}
				};
			}

			// ===== ЛУПА (КЛИК ПО КАРТИНКЕ) =====
			const imgWrapper = document.getElementById('modalImgWrapper');
			if (imgWrapper) {
				imgWrapper.onclick = GALLERY_toggleZoom;
				imgWrapper.addEventListener('wheel', GALLERY_handleWheel, { passive: false });
				imgWrapper.addEventListener('mousedown', GALLERY_startPan);
			}

			// Добавляем обработчики с capture: true (приоритет выше)
			document.addEventListener('mouseup', GALLERY_endPan, true);
			document.addEventListener('mousemove', GALLERY_movePan, true);

			// ===== ЗАКРЫТИЕ ПО КРЕСТИКУ — ВЫХОД ИЗ ЛУПЫ ИЛИ ЗАКРЫТИЕ МОДАЛКИ =====
			const closeBtn = document.getElementById('lituismModalClose');
			if (closeBtn) {
				closeBtn.onclick = function(e) {
					e.stopPropagation();
					e.preventDefault();

					const wrapper = document.getElementById('modalImgWrapper');
					if (wrapper && wrapper.classList.contains('zoomed')) {
						// Если в режиме лупы — просто выходим из лупы, НЕ закрываем модалку
						GALLERY_exitZoomOnly();
					} else {
						// Если не в режиме лупы — закрываем модалку
						GALLERY_closeModalNow();
					}
				};
			}

			const modalBg = document.getElementById('lituismModal');
			if (modalBg) {
				modalBg.onclick = GALLERY_closeOnBackground;
			}

			document.onkeydown = function(e) {
				if (e.key === 'Escape') {
					GALLERY_closeModalNow();
				}
			};

			// ===== ФИЛЬТРЫ =====
			const filterSliders = ['filterBrightness', 'filterSaturate', 'filterInvert', 'filterHue', 'filterBlur', 'filterScaleX', 'filterScaleY'];
			filterSliders.forEach(id => {
				const slider = document.getElementById(id);
				if (slider) {
					slider.addEventListener('input', GALLERY_updateFilters);
				}
			});

			const resetBtn = document.getElementById('filterResetAll');
			if (resetBtn) {
				resetBtn.addEventListener('click', GALLERY_resetFilters);
			}

			console.log('✦ LITUISM GALLERY v2.0 ИНИЦИАЛИЗИРОВАНА ✦');
			console.log('📦 Артефактов:', typeof TRUE_LIT_ARTS_COLLECTION !== 'undefined' ? TRUE_LIT_ARTS_COLLECTION.length : 'НЕТ');
		}, false);
