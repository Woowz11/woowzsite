<script>

console.log(WoowzProjects);

const container = document.getElementById("projectsContainer");

if(!WoowzProjects || WoowzProjects.length === 0){
	container.textContent = "Проекты пока не добавлены";
}else{
	WoowzProjects.forEach((project, index) => {
		const div = document.createElement("div");
		div.className = "project";

		div.innerHTML = Object.entries(project).map(([key, value]) => {
			let val = (typeof value === "object") ? JSON.stringify(value) : value;
			return `<b>${key}:</b> ${val}`;
		}).join("<br>");

		container.appendChild(div);
	});
}

</script>
